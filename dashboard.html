<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Video Money</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-lg">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="#">
                <i class="fas fa-video me-2 text-warning"></i>Video Money
            </a>
            <div class="navbar-nav ms-auto">
                <div class="nav-link d-flex align-items-center me-3 p-0">
                    <i class="fas fa-wallet fs-5 me-2 text-warning"></i>
                    <span class="badge bg-warning text-dark fs-6 fw-bold px-3 py-2 shadow" id="balance">Rp 0</span>
                </div>
                <a href="withdraw.html" class="btn btn-warning btn-sm me-2 shadow">
                    <i class="fas fa-money-bill-wave me-1"></i>Tarik Uang
                </a>
                <button class="btn btn-outline-light btn-sm shadow" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4 px-3 px-lg-5">
        <!-- Stats -->
        <div class="row g-4 mb-5">
            <div class="col-lg-3 col-md-6">
                <div class="card border-0 shadow-lg h-100 gradient-gold text-center text-white p-4 rounded-4">
                    <i class="fas fa-wallet fa-2x mb-3"></i>
                    <h3 class="fw-bold mb-1" id="totalBalance">Rp 0</h3>
                    <p class="mb-0 opacity-75 fs-6">Saldo Tersedia</p>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="card border-0 shadow-lg h-100 gradient-blue text-center text-white p-4 rounded-4">
                    <i class="fas fa-coins fa-2x mb-3"></i>
                    <h3 class="fw-bold mb-1" id="totalEarned">Rp 0</h3>
                    <p class="mb-0 opacity-75 fs-6">Total Penghasilan</p>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="card border-0 shadow-lg h-100 gradient-green text-center text-white p-4 rounded-4">
                    <i class="fas fa-play-circle fa-2x mb-3"></i>
                    <h3 class="fw-bold mb-1" id="videosWatched">0</h3>
                    <p class="mb-0 opacity-75 fs-6">Video Ditonton</p>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="card border-0 shadow-lg h-100 gradient-purple text-center text-white p-4 rounded-4">
                    <i class="fas fa-crown fa-2x mb-3"></i>
                    <h3 class="fw-bold mb-1">Level 3</h3>
                    <p class="mb-0 opacity-75 fs-6">VIP Member</p>
                </div>
            </div>
        </div>

        <!-- Videos -->
        <div class="row mb-3">
            <div class="col-12 d-flex justify-content-between align-items-center">
                <h2 class="fw-bold mb-0">
                    <i class="fas fa-play-circle text-warning me-2"></i>
                    Video Hari Ini
                </h2>
                <div class="text-end">
                    <span class="badge bg-success fs-6 me-2">+Rp15.000/hari</span>
                    <span class="badge bg-info fs-6">6 Video Baru</span>
                </div>
            </div>
        </div>
        
        <div class="row g-4" id="videosContainer">
            <!-- Videos loaded by JS -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
