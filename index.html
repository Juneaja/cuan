<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Money - Tonton Video Dapat Uang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Hero -->
    <section class="hero-gradient min-vh-100 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8 text-center text-white">
                    <div class="hero-content">
                        <i class="fas fa-video fa-4x mb-4 hero-icon"></i>
                        <h1 class="display-4 fw-bold mb-4">Video Money</h1>
                        <p class="lead mb-5 px-3">Tonton video pendek 30 detik, <strong>dapatkan Rp10.000/hari</strong> via WhatsApp!</p>
                        
                        <div class="d-flex gap-3 justify-content-center flex-wrap">
                            <button class="btn btn-warning btn-lg px-5 py-3 fw-bold shadow-lg fs-5" onclick="showLogin()">
                                <i class="fas fa-sign-in-alt me-2"></i>Login
                            </button>
                            <button class="btn btn-outline-light btn-lg px-5 py-3 fw-bold shadow-lg fs-5" onclick="showRegister()">
                                <i class="fas fa-user-plus me-2"></i>Daftar
                            </button>
                        </div>
                        
                        <div class="mt-5">
                            <small class="text-white-50">
                                ✅ 100K+ Pengguna | ✅ Bayar Tiap Hari | ✅ Min WD Rp10.000
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Auth Modal -->
    <div class="modal fade" id="authModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content rounded-4 shadow-lg border-0">
                <div class="modal-header border-0 bg-gradient-warning rounded-top-4">
                    <h5 class="modal-title fw-bold text-white mb-0" id="modalTitle">Login</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-5">
                    <form id="authForm">
                        <input type="hidden" id="authMode" value="login">
                        <div class="mb-4">
                            <label class="form-label fw-bold fs-5 mb-2">👤 Username / Email</label>
                            <input type="text" class="form-control form-control-lg rounded-3 shadow-sm" 
                                   id="username" placeholder="Masukkan username atau email" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold fs-5 mb-2">🔒 Password</label>
                            <input type="password" class="form-control form-control-lg rounded-3 shadow-sm" 
                                   id="password" placeholder="Masukkan password" required>
                        </div>
                        <div id="whatsappField" class="mb-4" style="display: none;">
                            <label class="form-label fw-bold fs-5 mb-2">📱 No WhatsApp</label>
                            <div class="input-group">
                                <span class="input-group-text bg-success text-white">
                                    <i class="fab fa-whatsapp"></i>
                                </span>
                                <input type="tel" class="form-control form-control-lg rounded-end-3" 
                                       id="whatsapp" placeholder="08xxxxxxxxx">
                            </div>
                            <div class="form-text">Untuk pencairan saldo</div>
                        </div>
                        <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold py-3 fs-5 shadow-lg rounded-3">
                            <span id="btnText">Masuk</span>
                            <i class="fas fa-spinner fa-spin ms-2 d-none" id="loadingSpinner"></i>
                        </button>
                    </form>
                    <div class="text-center mt-4 pt-3 border-top">
                        <small class="text-muted fs-6">
                            <span id="toggleText">Belum punya akun? 
                                <span class="text-warning fw-bold cursor-pointer" onclick="showRegister()">Daftar sekarang</span>
                            </span>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
