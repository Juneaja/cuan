<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnCash - Dapat Uang dari Nonton YouTube</title>
    <link rel="stylesheet" href="style.css">
    <!-- YouTube Iframe API -->
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div class="container">
        <!-- Header (sama seperti sebelumnya) -->
        <header class="header">
            <div class="logo">
                <h1>📺 EarnCash YouTube</h1>
                <p>Dapatkan uang dengan menonton YouTube!</p>
            </div>
            <div class="user-info">
                <span id="balance">Rp 0</span>
                <button class="withdraw-btn" onclick="withdraw()">Tarik Uang</button>
            </div>
        </header>

        <!-- Stats (sama) -->
        <div class="stats">
            <div class="stat-item">
                <span>Videos Ditonton</span>
                <strong id="videosWatched">0</strong>
            </div>
            <div class="stat-item">
                <span>Total Pendapatan</span>
                <strong id="totalEarned">Rp 0</strong>
            </div>
            <div class="stat-item">
                <span>Per Video</span>
                <strong id="avgReward">Rp 0</strong>
            </div>
        </div>

        <!-- YouTube Player Section -->
        <div class="video-section">
            <div class="youtube-container" id="youtubePlayerContainer">
                <!-- YouTube player akan dimuat di sini -->
            </div>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="video-info">
                <h3 id="videoTitle">Memuat video...</h3>
                <div class="video-meta">
                    <span id="channelName">-</span> • <span id="videoDuration">-</span>
                </div>
                <p id="videoReward">Hadiah: <strong>Rp 750</strong></p>
                <button class="next-video-btn" onclick="nextVideo()" disabled id="nextBtn">
                    🎥 Video Berikutnya
                </button>
            </div>
        </div>

        <!-- Video Queue -->
        <div class="video-list">
            <h3>Antrian Video YouTube (Klik untuk Nonton)</h3>
            <div id="videoQueue" class="queue"></div>
        </div>
    </div>

    <!-- Modal Withdraw (sama) -->
    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <h3>Tarik Pendapatan</h3>
            <p>Minimum: Rp 10.000 | Via DANA/OVO/Gopay</p>
            <input type="number" id="withdrawAmount" placeholder="Masukkan jumlah" min="10000">
            <div class="modal-buttons">
                <button onclick="confirmWithdraw()">💸 Tarik Sekarang</button>
                <button onclick="closeModal()">Batal</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
