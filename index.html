<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnCash - Dapat Uang dari Nonton Video</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h1>💰 EarnCash</h1>
                <p>Dapatkan uang dengan menonton video!</p>
            </div>
            <div class="user-info">
                <span id="balance">Rp 0</span>
                <button class="withdraw-btn" onclick="withdraw()">Tarik Uang</button>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-item">
                <span>Videos Ditonton</span>
                <strong id="videosWatched">0</strong>
            </div>
            <div class="stat-item">
                <span>Total Pendapatan</span>
                <strong id="totalEarned">Rp 0</strong>
            </div>
            <div class="stat-item">
                <span>Per Jam</span>
                <strong id="hourlyRate">Rp 0</strong>
            </div>
        </div>

        <!-- Video Player -->
        <div class="video-section">
            <div class="video-container">
                <video id="videoPlayer" controls width="100%">
                    <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                    Browser Anda tidak mendukung video.
                </video>
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
            </div>
            <div class="video-info">
                <h3 id="videoTitle">Big Buck Bunny - Video Demo</h3>
                <p id="videoReward">Hadiah: <strong>Rp 500</strong></p>
                <button class="next-video-btn" onclick="nextVideo()" disabled id="nextBtn">Video Berikutnya</button>
            </div>
        </div>

        <!-- Video List -->
        <div class="video-list">
            <h3>Video Selanjutnya</h3>
            <div id="videoQueue" class="queue">
                <!-- Videos akan dimuat di sini -->
            </div>
        </div>
    </div>

    <!-- Modal Withdraw -->
    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <h3>Tarik Pendapatan</h3>
            <p>Minimum penarikan: Rp 10.000</p>
            <input type="number" id="withdrawAmount" placeholder="Masukkan jumlah" min="10000">
            <div class="modal-buttons">
                <button onclick="confirmWithdraw()">Tarik</button>
                <button onclick="closeModal()">Batal</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
